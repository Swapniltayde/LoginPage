<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Registration</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h2>Create an Account</h2>
        <form onsubmit="register(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required autocomplete="username" placeholder="Choose a username">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required autocomplete="email" placeholder="Enter your email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required autocomplete="new-password" placeholder="Create a password (min 5 chars)">
            </div>
            <button type="submit">Sign Up</button>
            <div id="registerMsg" class="message"></div>
        </form>
        <div class="link">
            Already have an account? <a href="login.html">Log In</a>
        </div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
